name: Assembly Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm mingw-w64

    - name: Compile and Link
      run: |
        nasm -f win64 main.asm -o main.o
        x86_64-w64-mingw32-gcc main.o -o my_ip_tool.exe -lws2_32 -static

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        path: my_ip_tool.exe
